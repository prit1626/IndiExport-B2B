spring.application.name=IndiExport-Backend
#****  spring.profiles.active=dev

# Server Configuration
#server.port=8081
# server.port=8080
server.port=${PORT:8080}
server.address=0.0.0.0
# Database Configuration (PostgreSQL)
# Note: Update these values with actual database credentials

#spring.datasource.url=jdbc:postgresql://localhost:5432/indiexport_db
#spring.datasource.username=postgres
#spring.datasource.password=prit
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.root=INFO
logging.level.com.IndiExport.backend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Validation
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# CORS Configuration (for frontend integration)
spring.web.cors.allowed-origins=https://indiexport-b2b-frontend.onrender.com,http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT Configuration
# Secret key should be at least 256 bits (32 characters) - CHANGE IN PRODUCTION
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION}

# Security Configuration
security.password.min-length=8
security.max-active-devices=5

# Cloudinary Configuration
# REPLACE THESE WITH YOUR ACTUAL CLOUDINARY CREDENTIALS
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}


# File Upload Max Size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Currency Exchange Rate Configuration
currency.provider.base-url=https://api.frankfurter.dev/v1
currency.cache.ttl-minutes=30


# Razorpay Configuration (Buyer Payments)
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}